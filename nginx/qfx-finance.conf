# ============================================================
# QFX Finance - Nginx Reverse Proxy Configuration
# Domain  : qfx-finance.com
# Server  : 199.192.21.55  (ns2.qfx-finance.com)
#
# Deploy this file to:
#   /etc/nginx/sites-available/qfx-finance.conf
# Then enable:
#   ln -s /etc/nginx/sites-available/qfx-finance.conf \
#         /etc/nginx/sites-enabled/
# ============================================================

# ---------- Redirect HTTP → HTTPS (frontend) ----------
server {
    listen 80;
    server_name qfx-finance.com www.qfx-finance.com;

    # Allow Let's Encrypt ACME challenge before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://qfx-finance.com$request_uri;
    }
}

# ---------- Redirect HTTP → HTTPS (API) ----------
server {
    listen 80;
    server_name api.qfx-finance.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.qfx-finance.com$request_uri;
    }
}

# ---------- Frontend — https://qfx-finance.com ----------
server {
    listen 443 ssl;
    http2 on;
    server_name qfx-finance.com www.qfx-finance.com;

    # SSL — filled in automatically by Certbot
    ssl_certificate     /etc/letsencrypt/live/qfx-finance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qfx-finance.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy to Next.js container (localhost:3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ---------- Backend API — https://api.qfx-finance.com ----------
server {
    listen 443 ssl;
    http2 on;
    server_name api.qfx-finance.com;

    # SSL — filled in automatically by Certbot
    ssl_certificate     /etc/letsencrypt/live/api.qfx-finance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.qfx-finance.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS — allow requests from the frontend origin
    add_header Access-Control-Allow-Origin  "https://qfx-finance.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Vary                         "Origin" always;

    # Handle preflight OPTIONS
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Proxy to NestJS container (localhost:4000)
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
